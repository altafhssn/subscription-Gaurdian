<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;">
  <title>Subscription Guardian — Connected!</title>
  <link rel="stylesheet" href="/static/success.css">
</head>
<body>
  <div class="card">
    <div class="icon">🔐</div>
    <h1>Gmail Connected!</h1>
    <p>Your account <span class="email" id="email"></span> is linked.<br>
       Now let's scan your inbox for forgotten subscriptions.</p>
    <button class="scan-btn" id="scanBtn">🔍 Scan My Inbox</button>
    <div class="status" id="status">Ready to scan your last 90 days of emails</div>
    <div class="results" id="results">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px;">
        <div class="stat"><div class="stat-label">Subscriptions Found</div><div class="stat-value" id="subCount">0</div></div>
        <div class="stat"><div class="stat-label">Monthly Spend</div><div class="stat-value" id="monthlySpend">₹0</div></div>
        <div class="stat"><div class="stat-label">Yearly Spend</div><div class="stat-value" id="yearlySpend">₹0</div></div>
        <div class="stat"><div class="stat-label">You Think You Spend</div><div class="stat-value" id="perceived">₹500/mo</div></div>
      </div>
      <div class="stat" style="border:1px solid rgba(248,113,113,0.3);">
        <div class="stat-label">💰 Surprise Gap</div>
        <div class="stat-value waste" id="surpriseGap">₹0/mo</div>
      </div>
      <h3 style="margin-top:24px;margin-bottom:12px;">📋 Found Subscriptions</h3>
      <div class="sub-list" id="subList"></div>
    </div>
  </div>
  <script src="/static/success.js"></script>
</body>
</html>
