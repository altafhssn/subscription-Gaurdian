# Subscription Guardian — Railway Configuration (Python FastAPI + SQLite)

[build]
  builder = "nixpacks"
  buildCommand = "pip install -r requirements.txt"

[run]
  command = "uvicorn main:app --host 0.0.0.0 --port $PORT"

[deploy]
  # SQLite volume for persistent storage
  volumeMounts = [{ name = "data", mountPath = "/app" }]
