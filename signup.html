<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Get Early Access — Subscription Guardian</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: #d4d8dd;
  color: #2d3240;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}
/* Navigation */
nav {
  position: sticky; top: 0; z-index: 100;
  background: #d4d8dd;
  box-shadow: 4px 4px 8px #b5b9be, -4px -4px 8px #ffffff;
}
.nav-inner {
  max-width: 1200px; margin: 0 auto; padding: 0 24px;
  display: flex; align-items: center; justify-content: space-between;
  height: 68px;
}
.nav-left {
  display: flex; align-items: center; gap: 10px;
  text-decoration: none; color: #2d3240;
  font-weight: 700; font-size: 20px;
}
.nav-left svg { width: 22px; height: 22px; }
.nav-home {
  text-decoration: none; color: #7a7f8a;
  font-size: 15px; font-weight: 500;
  transition: color 0.15s;
  padding: 8px 16px; border-radius: 12px;
  box-shadow: 3px 3px 6px #b5b9be, -3px -3px 6px #ffffff;
}
.nav-home:hover { color: #2d3240; }
/* Signup Form */
.signup-wrapper {
  display: flex; align-items: center; justify-content: center;
  min-height: calc(100vh - 68px); padding: 48px 24px;
}
.signup-card {
  background: #dbdfe4;
  border-radius: 20px;
  padding: 44px;
  max-width: 440px;
  width: 100%;
  box-shadow: 8px 8px 16px #b5b9be, -8px -8px 16px #ffffff;
}
.signup-icon {
  width: 56px; height: 56px;
  border-radius: 16px;
  background: #d4d8dd;
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 18px; font-size: 24px;
  box-shadow: inset 3px 3px 6px #b5b9be, inset -3px -3px 6px #ffffff;
}
.signup-card h1 { text-align: center; font-size: 24px; font-weight: 700; margin-bottom: 8px; color: #2d3240; }
.signup-card .subtitle { text-align: center; font-size: 14px; color: #7a7f8a; margin-bottom: 28px; }
.form-group { margin-bottom: 18px; }
.form-group label { display: block; font-size: 13px; font-weight: 600; color: #2d3240; margin-bottom: 6px; }
.form-group input {
  width: 100%; padding: 14px 16px;
  border: none; border-radius: 14px;
  font-size: 15px; font-family: inherit; color: #2d3240;
  background: #d4d8dd; outline: none;
  box-shadow: inset 4px 4px 8px #b5b9be, inset -4px -4px 8px #ffffff;
  transition: box-shadow 0.15s;
}
.form-group input:focus {
  box-shadow: inset 5px 5px 10px #b8d1c0, inset -5px -5px 10px #ffffff;
}
.form-group input::placeholder { color: #7a7f8a; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.submit-btn {
  width: 100%; padding: 14px;
  background: #d4d8dd; color: #2d9d5e;
  border: none; border-radius: 14px;
  font-size: 16px; font-weight: 600; font-family: inherit;
  cursor: pointer;
  box-shadow: 4px 4px 8px #b5b9be, -4px -4px 8px #ffffff;
  transition: box-shadow 0.15s, transform 0.15s;
  margin-top: 4px; display: flex; align-items: center; justify-content: center; gap: 8px;
}
.submit-btn:hover {
  box-shadow: inset 3px 3px 6px #b5b9be, inset -3px -3px 6px #ffffff;
  transform: translateY(1px);
}
.submit-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
/* Divider */
.divider { display: flex; align-items: center; gap: 16px; margin: 24px 0; }
.divider::before, .divider::after {
  content: ''; flex: 1; height: 1px;
  background: #b5b9be;
}
.divider span { font-size: 13px; color: #7a7f8a; font-weight: 500; }
/* Google Button */
.google-btn {
  width: 100%; padding: 12px;
  background: #d4d8dd;
  border: none; border-radius: 14px;
  font-size: 15px; font-weight: 500; font-family: inherit; color: #2d3240;
  cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
  box-shadow: 4px 4px 8px #b5b9be, -4px -4px 8px #ffffff;
  transition: box-shadow 0.15s;
}
.google-btn:hover {
  box-shadow: inset 3px 3px 6px #b5b9be, inset -3px -3px 6px #ffffff;
}
/* Features strip */
.features-strip {
  display: flex; justify-content: center; gap: 20px;
  margin-top: 28px; flex-wrap: wrap;
}
.features-strip span {
  font-size: 13px; color: #7a7f8a;
  background: #d4d8dd;
  padding: 6px 16px; border-radius: 12px;
  box-shadow: inset 2px 2px 4px #b5b9be, inset -2px -2px 4px #ffffff;
  display: flex; align-items: center; gap: 4px;
}
.features-strip span::before { content: '¹3'; color: #2d9d5e; font-weight: 700; }
/* Pricing mini */
.pricing-mini { margin-top: 28px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.pricing-mini-card {
  background: #d4d8dd;
  border-radius: 14px;
  padding: 18px;
  text-align: center;
  box-shadow: 4px 4px 8px #b5b9be, -4px -4px 8px #ffffff;
}
.pricing-mini-card.featured {
  box-shadow: 4px 4px 8px #b8d1c0, -4px -4px 8px #ffffff;
}
.pricing-mini-card h4 { font-size: 14px; font-weight: 600; color: #2d3240; margin-bottom: 4px; }
.pricing-mini-card .price { font-size: 20px; font-weight: 700; color: #2d3240; }
.pricing-mini-card .price span { font-size: 13px; font-weight: 400; color: #7a7f8a; }
.pricing-mini-card .desc { font-size: 12px; color: #7a7f8a; margin-top: 2px; }
/* Toast */
.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
  background: #d4d8dd; color: #2d3240;
  padding: 14px 24px; border-radius: 14px;
  font-size: 14px; font-weight: 500;
  opacity: 0; transition: all 0.3s ease; z-index: 200;
  pointer-events: none;
  box-shadow: 8px 8px 16px #b5b9be, -8px -8px 16px #ffffff;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.success { background: #e8f0ea; color: #2d9d5e; }
/* Footer */
footer { background: #252a36; padding: 48px 0 24px; margin-top: auto; }
.footer-inner { max-width: 1200px; margin: 0 auto; padding: 0 24px; text-align: center; }
.footer-inner p { font-size: 13px; color: rgba(255,255,255,0.3); }
/* Mobile */
@media (max-width: 480px) {
  .signup-card { padding: 28px; }
  .form-row { grid-template-columns: 1fr; }
  .nav-inner { padding: 0 16px; }
  .signup-wrapper { padding: 24px 16px; }
}
</style>
</head>
<body>

<!-- Navbar -->
<nav>
  <div class="nav-inner">
    <a href="index.html" class="nav-left">
      <svg viewBox="0 0 24 24" fill="none" stroke="#2d9d5e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      Guardian.
    </a>
    <a href="index.html" class="nav-home">← Back to home</a>
  </div>
</nav>

<!-- Signup Form -->
<div class="signup-wrapper">
  <div class="signup-card">
    <div class="signup-icon">🔒</div>
    <h1>Get early access</h1>
    <p class="subtitle">Join thousands finding and cancelling unwanted subscriptions.</p>
    <form id="signupForm" novalidate>
      <div class="form-row">
        <div class="form-group">
          <label for="firstName">First name</label>
          <input type="text" id="firstName" placeholder="James" required>
        </div>
        <div class="form-group">
          <label for="lastName">Last name</label>
          <input type="text" id="lastName" placeholder="Wilson" required>
        </div>
      </div>
      <div class="form-group">
        <label for="email">Email address</label>
        <input type="email" id="email" placeholder="james@example.com" required>
      </div>
      <div class="form-group">
        <label for="password">Create password</label>
        <input type="password" id="password" placeholder="At least 8 characters" minlength="8" required>
      </div>
      <button type="submit" class="submit-btn" id="submitBtn">Join the waitlist →</button>
    </form>

    <div class="divider"><span>or</span></div>

    <button class="google-btn" id="googleBtn">
      <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Sign up with Google
    </button>

    <div class="features-strip">
      <span>Read-only Gmail</span>
      <span>Delete anytime</span>
      <span>Encrypted</span>
    </div>

    <div class="pricing-mini">
      <div class="pricing-mini-card">
        <h4>Free</h4>
        <div class="price">£0 <span>forever</span></div>
        <p class="desc">One-time scan</p>
      </div>
      <div class="pricing-mini-card featured">
        <h4>Guardian</h4>
        <div class="price">£3 <span>/month</span></div>
        <p class="desc">Auto-scan + alerts</p>
      </div>
    </div>
  </div>
</div>

<!-- Footer -->
<footer>
  <div class="footer-inner">
    <p>© 2026 Subscription Guardian. GDPR compliant.</p>
  </div>
</footer>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// Form submission
const form = document.getElementById('signupForm');
const submitBtn = document.getElementById('submitBtn');
const toast = document.getElementById('toast');

function showToast(message, type) {
  toast.textContent = message;
  toast.className = 'toast ' + type + ' show';
  setTimeout(() => { toast.classList.remove('show'); }, 4000);
}

form.addEventListener('submit', async function(e) {
  e.preventDefault();

  const firstName = document.getElementById('firstName').value.trim();
  const lastName = document.getElementById('lastName').value.trim();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;

  if (!firstName || !lastName || !email || !password) {
    showToast('Please fill in all fields.', '');
    return;
  }

  if (password.length < 8) {
    showToast('Password must be at least 8 characters.', '');
    return;
  }

  submitBtn.disabled = true;
  submitBtn.textContent = 'Joining the waitlist...';

  const data = { firstName, lastName, email };
  try {
    const existing = JSON.parse(localStorage.getItem('sg_waitlist') || '[]');
    existing.push({ ...data, timestamp: new Date().toISOString() });
    localStorage.setItem('sg_waitlist', JSON.stringify(existing));
  } catch (e) {}

  try {
    const res = await fetch('/api/waitlist', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, name: firstName + ' ' + lastName })
    });
    if (!res.ok) throw new Error('Server error');
  } catch (err) {
    console.log('API unavailable, saved locally');
  }

  showToast('\uD83C\uDF89 You\u2019re on the list! Check your inbox.', 'success');
  form.reset();
  submitBtn.disabled = false;
  submitBtn.textContent = 'Join the waitlist \u2192';
});

document.getElementById('googleBtn').addEventListener('click', function() {
  showToast('Google sign-up coming soon!', '');
});
</script>

</body>
</html>
