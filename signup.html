<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Get Early Access — Guardian</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; scroll-padding-top: 112px; }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: #f4f4f5;
  color: #18181b;
  line-height: 1.5;
  font-size: 16px;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  font-feature-settings: "cv11", "ss01";
  min-height: 100vh;
}
a { color: inherit; text-decoration: none; }

/* ─── Glass Nav ─── */
nav {
  position: sticky; top: 0; z-index: 100;
  background: rgba(255,255,255,0.9);
  backdrop-filter: saturate(180%) blur(10px);
  -webkit-backdrop-filter: saturate(180%) blur(10px);
  border-bottom: 1px solid #e4e4e7;
}
.nav-inner {
  max-width: 1200px; margin: 0 auto; padding: 0 24px;
  display: flex; align-items: center; justify-content: space-between;
  height: 72px;
}
.nav-left {
  display: flex; align-items: center; gap: 10px;
  font-weight: 700; font-size: 22px; color: #18181b;
}
.nav-left svg { width: 24px; height: 24px; flex-shrink: 0; }
.nav-home {
  color: #52525b; font-size: 15px; font-weight: 500;
  transition: color .15s; display: flex; align-items: center; gap: 6px;
}
.nav-home:hover { color: #18181b; }

/* ─── Signup Form ─── */
.signup-wrapper {
  display: flex; align-items: center; justify-content: center;
  min-height: calc(100vh - 72px); padding: 48px 24px;
}
.signup-card {
  background: #fff; border: 1px solid #e4e4e7; border-radius: 20px;
  padding: 48px; max-width: 440px; width: 100%;
  box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -2px rgba(0,0,0,0.05);
  position: relative;
}
.signup-card h1 {
  font-size: 28px; font-weight: 800; letter-spacing: -0.02em;
  color: #18181b; margin-bottom: 8px; text-align: center;
}
.signup-card p {
  font-size: 15px; color: #71717a; line-height: 1.6;
  margin-bottom: 28px; text-align: center;
}

/* Form elements */
.form-group { margin-bottom: 20px; }
.form-group label {
  display: block; font-size: 14px; font-weight: 500;
  color: #52525b; margin-bottom: 6px;
}
.form-group input {
  width: 100%; padding: 12px 16px; font-size: 15px; font-family: inherit;
  border: 1px solid #e4e4e7; border-radius: 10px;
  background: #fff; color: #18181b;
  outline: none; transition: border-color .2s, box-shadow .2s;
}
.form-group input:focus {
  border-color: #048c62;
  box-shadow: 0 0 0 3px rgba(4,140,98,0.12);
}
.form-group input::placeholder { color: #a1a1aa; }

.btn-sweep {
  position: relative; overflow: hidden; display: inline-flex;
  align-items: center; gap: 8px; cursor: pointer;
  border: none; outline: none; text-decoration: none;
  font-family: inherit; font-weight: 600; font-size: 15px;
  border-radius: 10px; padding: 14px 28px;
  background: linear-gradient(135deg, #048c62, #05956a);
  color: #fff; z-index: 1; width: 100%; justify-content: center;
  transition: box-shadow .2s, transform .15s;
}
.btn-sweep::before {
  content: ''; position: absolute; inset: 0; z-index: -1;
  background: #078e50;
  transform: skew(-45deg) scaleX(0);
  transform-origin: left;
  transition: transform .4s cubic-bezier(0.22, 1, 0.36, 1);
}
.btn-sweep:hover::before { transform: skew(-45deg) scaleX(1); }
.btn-sweep:hover { box-shadow: 0 0 0 2px rgba(4,140,98,0.15); }
.btn-sweep:active { transform: scale(0.97); }
.btn-sweep:disabled { opacity: 0.6; cursor: not-allowed; }
.btn-sweep:disabled:hover::before { transform: skew(-45deg) scaleX(0); }

.form-footer {
  text-align: center; margin-top: 20px; font-size: 13px; color: #71717a;
}
.form-footer a { color: #048c62; font-weight: 500; }
.form-footer a:hover { text-decoration: underline; }

/* Toast */
.toast {
  position: fixed; top: 24px; right: 24px; z-index: 999;
  background: #18181b; color: #fff; padding: 14px 24px;
  border-radius: 12px; font-size: 14px; font-weight: 500;
  box-shadow: 0 10px 15px -3px rgba(0,0,0,0.2), 0 4px 6px -2px rgba(0,0,0,0.1);
  transform: translateY(-20px); opacity: 0;
  transition: transform .3s cubic-bezier(0.22,1,0.36,1), opacity .3s;
  pointer-events: none;
}
.toast.show { transform: translateY(0); opacity: 1; }
.toast.success { border-left: 3px solid #048c62; }
.toast.error { border-left: 3px solid #ef4444; }

/* Page transition */
.page-fade { animation: pageEnter .5s ease-out; }
@keyframes pageEnter {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Responsive */
@media (max-width: 500px) {
  .signup-card { padding: 32px 24px; border-radius: 16px; }
  .signup-card h1 { font-size: 24px; }
}
</style>
</head>
<body class="page-fade">

<!-- ─── Navbar ─── -->
<nav>
  <div class="nav-inner">
    <a href="index.html" class="nav-left">
      <svg viewBox="0 0 24 24" fill="none" stroke="#048c62" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      Guardian
    </a>
    <a href="index.html" class="nav-home">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Back to Home
    </a>
  </div>
</nav>

<!-- ─── Signup ─── -->
<main class="signup-wrapper">
  <div class="signup-card">
    <h1>Get Early Access</h1>
    <p>Join the waitlist and be the first to know when we launch. Plus, get a free statement audit.</p>
    <form id="signupForm" novalidate>
      <div class="form-group">
        <label for="name">Full name</label>
        <input type="text" id="name" name="name" placeholder="Your name" required>
      </div>
      <div class="form-group">
        <label for="email">Email address</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required>
      </div>
      <button type="submit" class="btn-sweep" id="submitBtn">
        Join the Waitlist →
      </button>
    </form>
    <p class="form-footer">
      No spam, ever. Unsubscribe anytime. <a href="index.html">Learn more →</a>
    </p>
  </div>
</main>

<div class="toast" id="toast"></div>

<script>
(function(){
  const form = document.getElementById('signupForm');
  const submitBtn = document.getElementById('submitBtn');
  const toast = document.getElementById('toast');
  let toastTimer = null;

  function showToast(message, type) {
    toast.textContent = message;
    toast.className = 'toast ' + (type || 'success') + ' show';
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { toast.classList.remove('show'); }, 3500);
  }

  function postToServer(data) {
    return fetch('/api/waitlist', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    }).then(r => {
      if (!r.ok) throw new Error('Server error ' + r.status);
      return r.json();
    });
  }

  form.addEventListener('submit', function(e) {
    e.preventDefault();
    if (submitBtn.disabled) return;

    const name = document.getElementById('name').value.trim();
    const email = document.getElementById('email').value.trim();
    if (!name || !email) { showToast('Please fill in all fields.', 'error'); return; }
    if (!email.includes('@')) { showToast('Please enter a valid email.', 'error'); return; }

    submitBtn.disabled = true;
    submitBtn.textContent = 'Submitting...';

    const data = { name, email, source: 'guardian-waitlist', timestamp: new Date().toISOString() };

    postToServer(data)
      .then(() => {
        showToast('You\'re on the list! 🎉 Check your inbox.', 'success');
        form.reset();
      })
      .catch(() => {
        // Fallback: store in localStorage
        try {
          let entries = JSON.parse(localStorage.getItem('guardian_waitlist') || '[]');
          entries.push(data);
          localStorage.setItem('guardian_waitlist', JSON.stringify(entries));
          showToast('You\'re on the list! 🎉 (Offline mode)', 'success');
          form.reset();
        } catch(e) {
          showToast('Something went wrong. Please try again.', 'error');
        }
      })
      .finally(() => {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Join the Waitlist →';
      });
  });
})();
</script>
</body>
</html>
